# Cloud Build configuration para Orchestrator ADK
substitutions:
  _SERVICE_NAME: corpchat-orchestrator
  _REGION: us-central1
  _ENVIRONMENT: dev

steps:
  # Build Docker image (ejecutar desde services/agents/, context = .)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:latest'
      - '-f'
      - 'orchestrator/Dockerfile'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300s'
      - '--concurrency=80'
      - '--service-account=corpchat-app@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=True,MODEL=gemini-2.5-flash-001'
      - '--labels=team=corpchat,env=${_ENVIRONMENT},service=orchestrator'
      - '--no-allow-unauthenticated'
      - '--ingress=internal-and-cloud-load-balancing'

# Timeout para el build completo
timeout: '1200s'

# Opciones adicionales
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Imágenes a mantener
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:latest'

