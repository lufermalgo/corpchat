# ----------------------------------------------------------------
# -- Nginx Configuration for the API Gateway --
# ----------------------------------------------------------------
# This configuration sets up Nginx as a reverse proxy.
# It listens on port 8080 and forwards all requests from the UI
# that come to the /v1 path directly to the 'orchestrator' service
# on its internal port 8000.
#
# This acts as the single entry point for the backend, decoupling
# the UI from the internal service architecture.
# ----------------------------------------------------------------

server {
    listen 8080;
    
    # Increase body size limit for large conversations and context
    client_max_body_size 10M;

    location /v1 {
        # The hostname must match the container name of the orchestrator service.
        # This name is resolved by Docker's internal DNS.
        proxy_pass http://${PROJECT_PREFIX}-orchestrator:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long AI responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
