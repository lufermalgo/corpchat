# Cloud Build configuration para Gateway
substitutions:
  _SERVICE_NAME: corpchat-gateway
  _REGION: us-central1
  _ENVIRONMENT: dev

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60s'
      - '--concurrency=80'
      - '--service-account=corpchat-app@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars=VERTEX_PROJECT=${PROJECT_ID},VERTEX_LOCATION=${_REGION},MODEL=gemini-2.5-flash-001'
      - '--labels=team=corpchat,env=${_ENVIRONMENT},service=gateway'
      - '--allow-unauthenticated=false'
      - '--ingress=internal-and-cloud-load-balancing'

# Timeout para el build completo
timeout: '1200s'

# Opciones adicionales
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Imágenes a mantener
images:
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'

