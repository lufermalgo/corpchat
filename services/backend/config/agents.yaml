# Agent Configuration for CorpChat
# This file defines agent behavior and capabilities

agents:
  orchestrator:
    name: "orchestrator"
    description: "An orchestrator agent that coordinates multi-agent workflows and manages model selection"
    capabilities: ["orchestration", "model_selection", "task_delegation"]
    default_model: "gemini-2.5-flash-lite"
    prompt_ref: "orchestrator"  # Reference to prompts.yaml
    
  generalist:
    name: "generalist_agent"
    description: "A generalist agent that processes requests using different AI models based on user selection"
    capabilities: ["text_generation", "reasoning", "image_analysis", "multi_model"]
    default_model: "gemini-2.5-flash-lite"
    prompt_ref: "generalist"  # Reference to prompts.yaml
    
  data_analyst:
    name: "data_analyst_agent"
    description: "A specialized agent for data analysis, statistics, and business intelligence"
    capabilities: ["data_analysis", "statistics", "business_intelligence", "reporting"]
    default_model: "gemini-2.5-pro"
    prompt_ref: "data_analyst"  # Reference to prompts.yaml

# A2A Communication settings
a2a:
  timeout: 30
  retry_attempts: 3
  retry_delay: 1
