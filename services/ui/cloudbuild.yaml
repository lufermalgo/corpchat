# Cloud Build configuration para Open WebUI con branding
substitutions:
  _SERVICE_NAME: corpchat-ui
  _REGION: us-central1
  _ENVIRONMENT: dev
  _APP_TITLE: CorpChat

steps:
  # Build Docker image con branding
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'APP_TITLE=${_APP_TITLE}'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300s'
      - '--concurrency=80'
      - '--service-account=corpchat-app@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--set-env-vars=APP_TITLE=${_APP_TITLE},WEBUI_AUTH_PROVIDER=trusted_header'
      - '--labels=team=corpchat,env=${_ENVIRONMENT},service=ui'
      - '--no-allow-unauthenticated'
      - '--ingress=all'

# Timeout para el build completo
timeout: '1800s'

# Opciones adicionales
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Imágenes a mantener
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/corpchat/${_SERVICE_NAME}:latest'

