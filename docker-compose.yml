services:
  # ----------------------------------------------------------------
  # -- API Gateway Service --
  # ----------------------------------------------------------------
  gateway:
    build: ./services/gateway
    container_name: ${PROJECT_PREFIX}-gateway
    environment:
      - PROJECT_PREFIX=${PROJECT_PREFIX}
    ports:
      - "8080:8080" # Expose gateway on host port 8080 for API calls
    networks:
      - corpchat-net
    restart: unless-stopped

  # ----------------------------------------------------------------
  # -- UI Service (Open WebUI) --
  # ----------------------------------------------------------------
  ui:
    build: ./services/ui
    container_name: ${PROJECT_PREFIX}-ui
    ports:
      - "3000:8080" # Expose UI on host port 3000, internal port 8080
    depends_on:
      - gateway
    environment:
      # -- Core API Configuration --
      - OPENAI_API_BASE_URL=http://${PROJECT_PREFIX}-gateway:8080/v1
      - WEBUI_URL=http://localhost:3000
      - WEBUI_SECRET_KEY=${SECRET_KEY}

      # -- Disable automatic model downloads --
      - ENABLE_MODEL_FILTER=false
      - ENABLE_OPENAI_API=true
      - DEFAULT_MODELS=""
      - ENABLE_VERSION_UPDATE_CHECK=false
      - ENABLE_OLLAMA_API=false
      - OLLAMA_API_BASE_URL=""

      # -- Google OIDC Authentication --
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=https://accounts.google.com/.well-known/openid-configuration
      - ENABLE_OAUTH_SIGNUP=true
      - ENABLE_LOGIN_FORM=false
      - OAUTH_SCOPES=openid email profile
      - OAUTH_USERNAME_CLAIM=email

      # -- Other Settings --
      - SECRET_KEY=${SECRET_KEY}
      - WEBUI_SESSION_COOKIE_SAME_SITE=lax
      - WEBUI_AUTH_COOKIE_SAME_SITE=lax
      - WEBUI_SESSION_COOKIE_SECURE=false
      - WEBUI_AUTH_COOKIE_SECURE=false
      - OAUTH_SESSION_TOKEN_ENCRYPTION_KEY=${SECRET_KEY}
      
      # -- CORS and User Agent Configuration --
      - CORS_ALLOW_ORIGIN=http://localhost:3000
      - USER_AGENT=CorpChat-UI/1.0.0
    networks:
      - corpchat-net
    restart: unless-stopped

  # ----------------------------------------------------------------
  # -- Backend Orchestrator Service --
  # ----------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: ${PROJECT_PREFIX}-orchestrator
    command: python src/orchestrator/agent.py
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account-local.json
      - PROJECT_PREFIX=${PROJECT_PREFIX}
    volumes:
      - ./services/backend/config:/app/config:ro
    networks:
      - corpchat-net
    restart: unless-stopped

  # ----------------------------------------------------------------
  # -- Backend Agent Generalist Service --
  # ----------------------------------------------------------------
  agent-generalist:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: ${PROJECT_PREFIX}-agent-generalist
    command: python src/generalist/agent.py
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account-local.json
      - PROJECT_PREFIX=${PROJECT_PREFIX}
    volumes:
      - ./services/backend/config:/app/config:ro
    networks:
      - corpchat-net
    restart: unless-stopped

networks:
  corpchat-net:
    driver: bridge
